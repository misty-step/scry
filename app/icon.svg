<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gem / crystal — Scry brand icon -->
  <!-- Uses app primary blue hsl(221, 83%, 53%) -->
  <polygon points="50,6 90,38 50,94 10,38"
           fill="#2563eb"
           stroke="#1e3a5f"
           stroke-width="2.5"
           stroke-linejoin="round" />
  <!-- Crown facet -->
  <polyline points="10,38 50,50 90,38"
            fill="none"
            stroke="#1e3a5f"
            stroke-width="2"
            stroke-linejoin="round"
            opacity="0.45" />
  <!-- Center seam -->
  <line x1="50" y1="50" x2="50" y2="94"
        stroke="#1e3a5f"
        stroke-width="2"
        opacity="0.35" />
  <!-- Crown diagonals -->
  <line x1="50" y1="6" x2="34" y2="38"
        stroke="#1e3a5f"
        stroke-width="1.5"
        opacity="0.3" />
  <line x1="50" y1="6" x2="66" y2="38"
        stroke="#1e3a5f"
        stroke-width="1.5"
        opacity="0.3" />
  <!-- Highlight on upper-left facet for depth -->
  <polygon points="50,6 10,38 50,50"
           fill="#fff"
           opacity="0.12" />
</svg>
