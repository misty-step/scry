<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
  </defs>
  <!-- Diamond / gem shape -->
  <polygon points="50,8 88,40 50,92 12,40"
           fill="url(#g)"
           stroke="#4c1d95"
           stroke-width="3"
           stroke-linejoin="round" />
  <!-- Top facet line -->
  <polyline points="12,40 50,52 88,40"
            fill="none"
            stroke="#4c1d95"
            stroke-width="2.5"
            stroke-linejoin="round"
            opacity="0.5" />
  <!-- Center line down -->
  <line x1="50" y1="52" x2="50" y2="92"
        stroke="#4c1d95"
        stroke-width="2.5"
        opacity="0.4" />
  <!-- Top crown lines -->
  <line x1="32" y1="8" x2="12" y2="40"
        stroke="none" />
  <polyline points="50,8 35,40"
            fill="none"
            stroke="#4c1d95"
            stroke-width="2"
            opacity="0.35" />
  <polyline points="50,8 65,40"
            fill="none"
            stroke="#4c1d95"
            stroke-width="2"
            opacity="0.35" />
</svg>
