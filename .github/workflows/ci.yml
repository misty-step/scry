name: CI
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  NODE_VERSION: '20.20.0'
  PNPM_VERSION: '10.12.1'

jobs:
  # Shared quality checks that must pass first
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Verify Node version
        run: node -v | grep -q "v20.20" || exit 1

      - run: pnpm install --frozen-lockfile

      # Quality checks in parallel (40 seconds)
      - name: Run quality checks
        run: |
          pnpm lint &
          LINT_PID=$!
          pnpm typecheck &
          TSC_PID=$!
          pnpm audit --audit-level=critical &
          AUDIT_PID=$!
          wait $LINT_PID
          LINT_EXIT=$?
          wait $TSC_PID
          TSC_EXIT=$?
          wait $AUDIT_PID
          AUDIT_EXIT=$?
          [ "$LINT_EXIT" -ne 0 ] && echo "ERROR: lint failed (exit $LINT_EXIT)"
          [ "$TSC_EXIT" -ne 0 ] && echo "ERROR: typecheck failed (exit $TSC_EXIT)"
          [ "$AUDIT_EXIT" -ne 0 ] && echo "ERROR: audit failed (exit $AUDIT_EXIT)"
          if [ "$LINT_EXIT" -ne 0 ] || [ "$TSC_EXIT" -ne 0 ] || [ "$AUDIT_EXIT" -ne 0 ]; then
            echo "ERROR: Quality checks failed"
            exit 1
          fi

      - name: Check for .only in tests
        run: |
          if git grep -E "(describe|test|it)\.only" -- "*.test.ts" "*.test.tsx"; then
            echo "ERROR: Found .only in test files"
            echo "Remove .only before committing"
            exit 1
          fi

  # Test job with coverage reporting
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:ci

      - name: Verify coverage files exist
        if: always()
        run: |
          if [ ! -f "./coverage/coverage-summary.json" ]; then
            echo "Error: coverage-summary.json not found"
            ls -la ./coverage/ 2>/dev/null || echo "Coverage directory does not exist"
            exit 1
          fi
          if [ ! -f "./coverage/coverage-final.json" ]; then
            echo "Error: coverage-final.json not found"
            ls -la ./coverage/ 2>/dev/null || echo "Coverage directory does not exist"
            exit 1
          fi
          echo "Coverage files verified:"
          ls -la ./coverage/*.json

      - name: Coverage Report
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json
          vite-config-path: ./vitest.config.ts
          file-coverage-mode: changes
